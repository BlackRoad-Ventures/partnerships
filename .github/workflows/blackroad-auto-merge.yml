name: Auto-Merge PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    name: Auto-Merge When Checks Pass
    runs-on: ubuntu-latest

    # Run for any PR (not just bot PRs)
    if: >
      github.event_name == 'check_suite' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Get PR Details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get PR number
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ -n "${{ github.event.check_suite.pull_requests[0].number }}" ]; then
            PR_NUMBER="${{ github.event.check_suite.pull_requests[0].number }}"
          elif [ -n "${{ github.event.review.pull_request.number }}" ]; then
            PR_NUMBER="${{ github.event.review.pull_request.number }}"
          else
            echo "No PR found, exiting"
            echo "number=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

          # Get PR data
          PR_DATA=$(gh pr view "$PR_NUMBER" --json statusCheckRollup,headRefName,mergeable,mergeStateStatus,labels,reviewDecision 2>/dev/null || echo "{}")

          MERGEABLE=$(echo "$PR_DATA" | jq -r '.mergeable // "UNKNOWN"')
          MERGE_STATE=$(echo "$PR_DATA" | jq -r '.mergeStateStatus // "UNKNOWN"')
          BRANCH=$(echo "$PR_DATA" | jq -r '.headRefName // ""')
          REVIEW=$(echo "$PR_DATA" | jq -r '.reviewDecision // "NONE"')
          HAS_AUTO_MERGE=$(echo "$PR_DATA" | jq -r '[.labels[]?.name] | any(. == "auto-merge")' 2>/dev/null || echo "false")

          # Check all status checks
          ALL_PASSED=$(echo "$PR_DATA" | jq -r '
            if (.statusCheckRollup | length) == 0 then "true"
            else [.statusCheckRollup[] | select(.conclusion != null) | .conclusion] | all(. == "SUCCESS" or . == "NEUTRAL" or . == "SKIPPED") | tostring
            end
          ' 2>/dev/null || echo "false")

          PENDING=$(echo "$PR_DATA" | jq -r '[.statusCheckRollup[] | select(.conclusion == null)] | length' 2>/dev/null || echo "0")

          echo "mergeable=$MERGEABLE" >> $GITHUB_OUTPUT
          echo "merge_state=$MERGE_STATE" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "review=$REVIEW" >> $GITHUB_OUTPUT
          echo "has_auto_merge=$HAS_AUTO_MERGE" >> $GITHUB_OUTPUT
          echo "all_passed=$ALL_PASSED" >> $GITHUB_OUTPUT
          echo "pending=$PENDING" >> $GITHUB_OUTPUT

          echo "PR #$PR_NUMBER: mergeable=$MERGEABLE all_passed=$ALL_PASSED pending=$PENDING branch=$BRANCH"

      - name: Evaluate Auto-Merge
        id: evaluate
        if: steps.pr.outputs.number != ''
        run: |
          CAN_MERGE="false"
          REASON=""

          BRANCH="${{ steps.pr.outputs.branch }}"
          MERGEABLE="${{ steps.pr.outputs.mergeable }}"
          ALL_PASSED="${{ steps.pr.outputs.all_passed }}"
          PENDING="${{ steps.pr.outputs.pending }}"
          HAS_LABEL="${{ steps.pr.outputs.has_auto_merge }}"

          # Auto-merge criteria:
          # 1. claude/ branches (automated PRs) — merge when checks pass
          # 2. blackroad-auto-fix branches (self-healing) — merge when checks pass
          # 3. Any PR with "auto-merge" label — merge when checks pass

          IS_AUTO_BRANCH="false"
          if [[ "$BRANCH" == claude/* ]] || [[ "$BRANCH" == blackroad-auto-fix* ]]; then
            IS_AUTO_BRANCH="true"
          fi

          if [[ "$IS_AUTO_BRANCH" != "true" ]] && [[ "$HAS_LABEL" != "true" ]]; then
            REASON="Not an auto-merge branch or labeled PR (branch=$BRANCH)"
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "$REASON"
          elif [[ "$PENDING" != "0" ]]; then
            REASON="Checks still pending ($PENDING remaining)"
          elif [[ "$ALL_PASSED" != "true" ]]; then
            REASON="Some checks failed"
          elif [[ "$MERGEABLE" != "MERGEABLE" ]]; then
            REASON="PR has merge conflicts"
          else
            CAN_MERGE="true"
          fi

          echo "can_merge=$CAN_MERGE" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT
          echo "Decision: can_merge=$CAN_MERGE reason=$REASON"

      - name: Merge PR
        if: steps.evaluate.outputs.can_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          echo "Merging PR #$PR_NUMBER..."

          gh pr merge "$PR_NUMBER" \
            --squash \
            --delete-branch \
            --body "Auto-merged: all checks passed.

          Branch: ${{ steps.pr.outputs.branch }}
          Merged by BlackRoad Auto-Merge"

          echo "PR #$PR_NUMBER merged successfully"

      - name: Comment on Merge
        if: steps.evaluate.outputs.can_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ steps.pr.outputs.number }}" --body "**Auto-Merge Complete**

          - All checks passed
          - No merge conflicts
          - Squash-merged to main

          Branch \`${{ steps.pr.outputs.branch }}\` has been deleted." || true
